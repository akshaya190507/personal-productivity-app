<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Productivity Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  
</head>
<body>

  <header>
    <h1>My Productivity Dashboard</h1>
    <p id="date"></p>
  </header>
    
  <nav class="navbar">
    <a href="index.html" class="nav-link active">Dashboard</a>
    <a href="habits.html" class="nav-link">Habits</a>
    <a href="stats.html" class="nav-link">Stats</a>
    <a href="weekly.html" class="nav-link">Weekly</a>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </nav>

  <div class="nav-buttons">
    <button onclick="window.location.href='pomodoro.html'">
      ⏱ Focus Mode
    </button>
  </div>

  <!-- 📊 Dashboard Stats -->
  <section class="stats">
    <div class="stat-card">
      <h3>Pending</h3>
      <p id="pendingCount">0</p>
    </div>
    <div class="stat-card">
      <h3>In Progress</h3>
      <p id="inProgressCount">0</p>
    </div>
    <div class="stat-card">
      <h3>Done</h3>
      <p id="doneCount">0</p>
    </div>
  </section>

  <!-- ➕ Add Task Section -->
  <section class="add-task">
    <h2>Add New Task</h2>

    <input type="text" id="title" placeholder="Task title" />
    <textarea id="description" placeholder="Description (optional)"></textarea>

    <input type="date" id="dueDate" />

    <select id="status">
      <option value="pending">Pending</option>
      <option value="in-progress">In Progress</option>
      <option value="done">Done</option>
    </select>

    <select id="mood">
      <option value="motivated">Motivated</option>
      <option value="neutral">Neutral</option>
      <option value="happy">Happy</option>
      <option value="sad">Sad</option>
      <option value="stressed">Stressed</option>
    </select>

    <button id="addTaskBtn">Add Task</button>
  </section>

  <!-- 🗂️ Main Dashboard Columns -->
  <main class="dashboard">
    <section id="pending">
      <h2>Pending</h2>
      <div class="task-list"></div>
    </section>

    <section id="in-progress">
      <h2>In Progress</h2>
      <div class="task-list"></div>
    </section>

    <section id="done">
      <h2>Done</h2>
      <div class="task-list"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
